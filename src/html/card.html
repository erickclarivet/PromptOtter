<div class="canvas">
  <div class="card">
    <div class="card-content">

      <div class="center">
        <div class="winner section-gap">🏆 Chosen by the community</div>
        <img class="avatar" src="{{PROFILE_IMAGE_URL}}" alt="Profile" />

        
        <div class="username">@{{USERNAME}}</div>

        <div class="prompt-group section-gap">
          <div class="label">✏️ USER PROMPT</div>
          <div class="prompt">“{{PROMPT}}”</div>
        </div>
      </div>

      <div class="bottom-label">
        ✨ Want yours painted next ?
      </div>
      
      <div class="footer section-gap">
        <div><span class="plus">➕</span> Follow</div>
        <div>✏️ Prompt on latest post</div>
        <div>💡 Start with <span class="prompt-badge">Prompt:</span></div>
        <div>❤️ Like to vote (3 days)</div>
      </div>
      <div class="painted-by">
        🎨 Painted by Otto
      </div>
    </div>
  </div>
</div>
